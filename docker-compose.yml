version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: visualy-postgres
    environment:
      POSTGRES_USER: visualy_user
      POSTGRES_PASSWORD: visualy_password
      POSTGRES_DB: visualy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visualy_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visualy-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: visualy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visualy-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: visualy-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: visualy
      RABBITMQ_DEFAULT_PASS: visualy_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visualy-network

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visualy-backend
    environment:
      DATABASE_URL: postgresql://visualy_user:visualy_password@postgres:5432/visualy_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://visualy:visualy_password@rabbitmq:5672/
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - visualy-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visualy-celery
    environment:
      DATABASE_URL: postgresql://visualy_user:visualy_password@postgres:5432/visualy_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://visualy:visualy_password@rabbitmq:5672/
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - backend
    networks:
      - visualy-network
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visualy-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - visualy-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  visualy-network:
    driver: bridge
